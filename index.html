<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Connect New Page</h3>
        <input type="text" id="pageName" placeholder="Page Name">
        <input type="text" id="listId" placeholder="EmailOctopus List ID">
        <button onclick="save()">SAVE CONNECTION</button>
        <div id="status" style="margin-top:10px;"></div>
    </div>

    <script>
        const client = supabase.createClient('https://sakmxnvvsdeqvdzggrrj.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNha214bnZ2c2RlcXZkemdncnJqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjM4NzkzOCwiZXhwIjoyMDg3OTYzOTM4fQ.kQSFQhm1r_Hh5jHvyUrZeox9tqKfFtiMLWgfjtAUsqI');
        async function save() {
            const page_name = document.getElementById('pageName').value;
            const eo_list_id = document.getElementById('listId').value;
            const { error } = await client.from('app_mappings').upsert({ page_name, eo_list_id });
            document.getElementById('status').innerText = error ? "Error!" : "Success!";
        }
    </script>
</body>
</html>
